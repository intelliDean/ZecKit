name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - m3-implementation
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: zebra-miner
            context: ./docker/zebra
          - service: zebra-sync
            context: ./docker/zebra
          - service: lightwalletd
            context: ./docker/lightwalletd
          - service: zaino
            context: ./docker/zaino
          - service: zingo
            context: ./docker/zingo
          - service: zeckit-faucet
            context: ./zeckit-faucet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo
        id: repo
        shell: bash
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
