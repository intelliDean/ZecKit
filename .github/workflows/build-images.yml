name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - m3-implementation
    paths:
      - 'docker/**'
      - 'zeckit-faucet/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: zebra-miner
            context: ./docker/zebra
          - service: zebra-sync
            context: ./docker/zebra
          - service: lightwalletd
            context: ./docker/lightwalletd
          - service: zaino
            context: ./docker/zaino
          - service: zingo
            context: ./docker/zingo
          - service: zeckit-faucet
            context: ./zeckit-faucet

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:${{ github.ref_name }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:buildcache
          cache-to: |
            type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:buildcache,mode=max
            